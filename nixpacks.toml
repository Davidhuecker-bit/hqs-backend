# ─────────────────────────────────────────────────────────────────────────────
# nixpacks.toml — Nixpacks build configuration (FALLBACK ONLY)
# ─────────────────────────────────────────────────────────────────────────────
# NOTE: Railway's default builder is now Railpack (replaces Nixpacks).
# Railpack reads railpack.json — it does NOT read this file.
# This file is kept as a fallback in case a service is explicitly configured
# to use Nixpacks via the Railway dashboard.
#
# Active Railpack config is in railpack.json at the project root.
#
# Explicitly forces Node.js as the primary provider so that the presence of
# requirements.txt (used only by the Python Historical Backfill job) does NOT
# cause nixpacks to switch to a Python-only build environment.
#
# Both Node.js/npm and Python3/pip are made available so that:
#   - All Node.js services (HQS Backend API + every cron job) work normally
#   - The "Historical Backfill" Railway service can run python3
# ─────────────────────────────────────────────────────────────────────────────

providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20", "python3", "python3Packages.pip"]

[phases.install]
cmds = ["npm ci", "pip3 install -r requirements.txt"]
